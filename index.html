<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarVault</title>
    <link rel="stylesheet" href="styles.css">
       
</head>
<body>
    <header class="header">
        <div class="brand-group">
            <h2>CarVault</h2>
            <div class="logo-container">
                <img src="pictures/logo.png" alt="Logo">
            </div>
        </div>
    </header>

    <div class="image-container">
        <img src="pictures/5864.png" alt="Cars Display">
    </div>

    <div class="login-container">   
        <form id="loginForm">
        <h2>Sign In</h2>

            <!-- USERNAME/EMAIL -->
            <div class="first-input input-field-group">
                <input type="text" id="username" name="username" required> 
                <label for="username">Username / Email</label>
            </div>

            <!-- PASSWORD -->
            <div class="first-input input-field-group password-container">
                <input type="password" id="password" name="password" required>
                <label for="password">Password</label>
                <span class="toggle-password" id="togglePassword"></span>
            </div>

            <!-- REMEMBER ME & FORGOT PASSWORD -->
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember">
                    <span>Remember me</span>
                </label>
                <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
            </div>

            <!-- SUBMIT BUTTON -->
            <div class="container">
                <button type="submit">Login</button>                   
            </div>

            <!-- REGISTER LINK -->
           <div class="register" id="register-link">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
                <p style="text-align: center;">or</p>
                <p>Enter as <a href="frontpage.html">Guest</a></p>
            </div>
        </form>
    </div>


   <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const guestLink = document.querySelector('a[href="frontpage.html"]');

        togglePassword.textContent = '👁️'; 
        togglePassword.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.textContent = type === 'password' ? '👁️' : '🙈';
        });

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const enteredUser = usernameInput.value;
            const enteredPass = passwordInput.value;

            const storedData = localStorage.getItem(enteredUser);

            if (storedData) {
                const user = JSON.parse(storedData);

                // Check if password matches
                if (user.password === enteredPass) {
                    sessionStorage.setItem('userRole', 'user');
                    window.location.href = 'frontpage.html';
                } else {
                    alert("Incorrect password. Please try again.");
                }
            } else {
                alert("Username not found. Please register first.");
            }
        });

        guestLink.addEventListener('click', function() {
            sessionStorage.setItem('userRole', 'guest');
        });
</script>
</body>
</html>
